<!DOCTYPE html>
<html lang="th">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">


<style>

/* =====================
   RESET
===================== */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Prompt',sans-serif;
}


/* =====================
   PASTEL YELLOW BACKGROUND
===================== */

body{

    min-height:100vh;

    background:#FFF9DB;

    overflow-x:hidden;

}


/* Pastel Glow */

body::before{

    content:"";

    position:fixed;

    width:450px;

    height:450px;

    background:#FFF3B0;

    border-radius:50%;

    filter:blur(120px);

    top:-150px;

    left:-120px;

    z-index:-1;

}


body::after{

    content:"";

    position:fixed;

    width:450px;

    height:450px;

    background:#FFE8A3;

    border-radius:50%;

    filter:blur(120px);

    bottom:-150px;

    right:-120px;

    z-index:-1;

}


/* =====================
   MENU
===================== */

nav{

    position:fixed;

    top:20px;

    left:50%;

    transform:translateX(-50%);

    width:90%;

    display:flex;

    justify-content:center;

    flex-wrap:wrap;

    gap:20px;

    padding:18px;

    background:rgba(255,255,255,.55);

    backdrop-filter:blur(15px);

    border-radius:50px;

    box-shadow:0 10px 30px rgba(194,139,0,.15);

}


nav a{

    text-decoration:none;

    color:#B88600;

    font-weight:600;

    transition:.3s;

}


nav a:hover{

    color:#E6A700;

}


/* =====================
   GLASS CARD
===================== */

.container,
.profile-box,
.card{

    background:rgba(255,255,255,.55);

    backdrop-filter:blur(20px);

    border-radius:35px;

    box-shadow:

    0 20px 50px rgba(194,139,0,.18);

}


/* =====================
   IMAGE
===================== */

.profile{

    border:7px solid white;

    box-shadow:

    0 0 30px #FFD54F;

}


/* =====================
   TEXT
===================== */


h1{

    color:#B88600;

}


h2{

    color:#D89B00;

}


h3{

    color:#D89B00;

}


p{

    color:#7A5B00;

}



/* =====================
   BUTTON
===================== */


button{

    background:

    linear-gradient(

    45deg,

    #FFE082,

    #FFD54F

    );

    color:#6B4F00;

    border:none;

    padding:15px 45px;

    border-radius:50px;

    font-weight:bold;

    cursor:pointer;

    box-shadow:

    0 8px 20px rgba(255,193,7,.35);

}


button:hover{

    transform:translateY(-5px);

}


/* =====================
   DECORATION
===================== */


.star{

    color:#FBBF24;

    text-shadow:

    0 0 10px #FFE082;

}

</style>


</head>



<body>



<!-- MENU -->

<nav>

<a href="#">หน้าปก</a>

<a href="#">ประวัติส่วนตัว</a>

<a href="#">ประวัติการศึกษา</a>

<a href="#">ผลการเรียน</a>

<a href="#">เกียรติบัตร</a>

<a href="#">กิจกรรม</a>

</nav>

<!-- หน้าปก -->


<section class="hero">


<div class="profile-box">


<img src="images/1783693084905.jpg" class="profile" alt="รูปโปรไฟล์">
<h1>
PORTFOLIO
</h1><h2 id="student-name">
นางสาวธัญพร โคโตสี
</h2>
<p>
นักเรียนชั้นมัธยมศึกษาปีที่ 6
<br>
โรงเรียนพานทอง
<br>
แผนการเรียน วิทยาศาสตร์-คณิตศาสตร์
</p>
<button onclick="location.href='profile.html'">
เข้าสู่ Portfolio

</button>


</div>


</section>



<script>


// =====================
// สร้างดาวตก
// =====================


for(let i=0;i<60;i++){


let star=document.createElement("div");


star.className="star";


star.innerHTML="✦";


star.style.left=
Math.random()*100+"vw";


star.style.fontSize=
(10+Math.random()*18)+"px";


star.style.animationDuration=
(6+Math.random()*10)+"s";


star.style.animationDelay=
Math.random()*10+"s";


document.body.appendChild(star);


}


</script>



</body>

</html>
